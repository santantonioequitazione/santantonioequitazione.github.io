name: Build minified assets

on:
  push:
    branches: ["main", "master"]
    paths:
      - "script.js"
      - "styles.css"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/minify-assets.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  minify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build minified assets
        run: npm run build:min

      - name: Commit generated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Aggiorna asset minificati automatici"
          file_pattern: script.min.js styles.min.css
